<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus HLS | Node Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; text-align: center; padding: 20px; }
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 20px; max-width: 400px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #f39c12; margin-top: 0; }
        .dist { font-size: 3rem; font-weight: bold; margin: 10px 0; color: #00e676; }
        button { background-color: #f39c12; color: #000; border: none; padding: 15px 20px; font-size: 1.1rem; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 10px; transition: 0.2s; }
        button:hover { background-color: #e67e22; }
        button.setup { background-color: #3498db; }
        input { padding: 12px; width: 90%; font-size: 1rem; border-radius: 5px; border: none; margin-bottom: 15px; box-sizing: border-box; text-align: center; }
        .footer { font-size: 0.8rem; color: #666; margin-top: 30px; }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d0/Bluetooth_Logo.svg/200px-Bluetooth_Logo.svg.png" width="50" style="opacity: 0.7;">
    <h1>Focus HLS Manager</h1>

    <div class="card">
        <h2>Live Tracking</h2>
        <p id="nodeNameDisplay">Status: Disconnected</p>
        <div class="dist" id="distanceDisplay">-- m</div>
        <p style="color:#888;">Live Distance Estimate</p>
        <button onclick="startTracking()">SYNC WITH NODE</button>
    </div>

    <div class="card">
        <h2>Node Setup (OTA)</h2>
        <p style="font-size:0.9rem; color:#aaa;">Connect to a Blank Node to assign its permanent location name.</p>
        <input type="text" id="newNameInput" placeholder="e.g., Server Room 1" />
        <button class="setup" onclick="setupNewNode()">ASSIGN NAME TO NODE</button>
    </div>

    <div class="footer">Secure Bluetooth API &bull; Requires Google Chrome</div>

    <script>
        const TACTICAL_SERVICE_UUID = '0000180f-0000-1000-8000-00805f9b34fb';
        const SETUP_CHAR_UUID = '00009999-0000-1000-8000-00805f9b34fb';

        // 1. Math to convert raw volume (RSSI) into Physical Distance (Meters)
        function calculateDistance(rssi) {
            if (rssi === 0) return 0;
            const txPower = -65; // Calibrated for ESP32 +9dBm at 1 meter
            const environmentalFactor = 2.5; 
            let ratio = (txPower - rssi) / (10 * environmentalFactor);
            let distanceInMeters = Math.pow(10, ratio);
            return distanceInMeters.toFixed(2); 
        }

        // 2. LIVE TRACKING LOGIC (Passive Listening)
        async function startTracking() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [0x180F] }] // Strict filter to hide TVs/Headphones
                });

                document.getElementById("nodeNameDisplay").innerText = "Connecting...";
                
                await device.watchAdvertisements();
                let nodeName = device.name || "Focus Node [Unknown]";
                document.getElementById("nodeNameDisplay").innerText = "Tracking: " + nodeName;

                // Listen for physical radio pings
                device.addEventListener('advertisementreceived', (event) => {
                    // Update name if the scan response packet arrives late
                    if (event.device.name && event.device.name !== nodeName) {
                        nodeName = event.device.name;
                        document.getElementById("nodeNameDisplay").innerText = "Tracking: " + nodeName;
                    }

                    // Convert physics to distance
                    let distance = calculateDistance(event.rssi);
                    document.getElementById("distanceDisplay").innerText = distance + " m";
                });

            } catch (error) {
                console.error(error);
                alert("Tracking Error. Ensure Location & Bluetooth are enabled in Android settings.");
            }
        }

        // 3. OTA PROVISIONING LOGIC (Active Connection & Write)
        async function setupNewNode() {
            const newName = document.getElementById("newNameInput").value;
            if(!newName) { alert("Please type a name first!"); return; }

            try {
                // Find the device
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [0x180F] }]
                });

                // Connect to the ESP32's Internal Server
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(TACTICAL_SERVICE_UUID);
                const characteristic = await service.getCharacteristic(SETUP_CHAR_UUID);

                // Encode the text and beam it to the board
                const encoder = new TextEncoder();
                await characteristic.writeValue(encoder.encode(newName));

                alert(`Success! The Node has been permanently programmed as "${newName}". It will now reboot.`);
                
                // Disconnect so it can reboot cleanly
                server.disconnect();
                document.getElementById("newNameInput").value = "";

            } catch (error) {
                console.error(error);
                alert("Setup Failed. Ensure you are close to the node.");
            }
        }
    </script>
</body>
</html>
